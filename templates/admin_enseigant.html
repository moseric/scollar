{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/enseignant.css' %}">
    <title>Partie enseignant</title>
</head>
<body class="container">
    <div class="d-flex mx-auto">
        <div class="info text-center">
            Nombre de classe
        </div>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#observation">
            Observation
        </button>
        <div class="modal fade" id="observation" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h6 class="modal-title">Decrivez le comportement de l'apprenant en situation de classe</h6>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form action="">
                            <div class="mt-2">
                                <label for=""> Nom de l'eleves</label>
                                <input type="text" name="nom" class="form-control">
                            </div>
                            <div class="mt-2">
                                <label for=""> les observations</label>
                                <textarea name="observation" id="" class="form-control">
                                    
                                </textarea>
                            </div>

                        </form>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary" >Enregistrer</button>
                    </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="button bg-primary">
            <a href="{% url 'notes' %}">inserer les notes</a>
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
