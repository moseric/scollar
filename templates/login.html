{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <title>Document</title>
</head>
<body class="container model">
    <div class="mt-5 d-flex w-100 ">
        <div class="ms-auto w-25 bg-white affiche p-3">
            <form action=" " method="post" class="w-100 ">
                <legend class="text-center ">
                    Connexion
                </legend>
                <div class="mt-2">
                    <select name="user" id="" class="form-select">
                        <option value="">Fais un choix</option>
                        <option value="Directeur">Direction</option>
                        <option value="Censeur">Censorat</option>
                        <option value="secretariat">Secretariat</option>
                        <option value="comptabilité">Comptabilité</option>
                        <option value="surveillance">Surveillance</option>
                        <option value="Enseignant">Enseigant</option>
                        <option value="parents">Parents</option>
                    </select>
                </div>
                <div class="mt-2">
                    <label for="">Mot de passe</label>
                    <input type="text" name="password" class="form-control">
                </div>
                <div class="mt-2">
                    <input type="submit" value="connecter" class="btn btn-primary">
                </div>
            </form>
        </div>
        <div class=" me-auto text-white text-center w-25 bg-info login affiche">
           <p class="ms-2 me-2">BIENVENUE SUR LA PLATEFORME DE GESTION ACADEMIQUE</p>
        </div>
    </div>
    <div class="animation">
    </div>
</body>
</html>
